<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12161d;
    --panel: #1a2029;
    --panel-hover: #1f2732;
    --line: #2a323d;
    --text: #e7eaee;
    --text-dim: #8b95a3;
    --accent: #5ee0b5;
    --accent-dim: rgba(94,224,181,.14);
    --amber: #e0b55e;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',sans-serif;line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,.display{font-family:'Space Grotesk',sans-serif;letter-spacing:-.01em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:3px;}

  /* ===== reduced motion ===== */
  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important;}
  }

  /* ===== layout shell ===== */
  .wrap{max-width:880px;margin:0 auto;padding:0 24px;}

  /* ===== header ===== */
  header{
    padding:52px 0 36px;border-bottom:1px solid var(--line);
    position:relative;overflow:hidden;
  }
  header:before{
    content:"";position:absolute;top:-120px;right:-80px;width:360px;height:360px;
    background:radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
    pointer-events:none;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--accent);
    letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px;
    opacity:0;animation:fadeUp .6s ease forwards;
  }
  header h1{
    font-size:clamp(34px,6vw,52px);margin:0 0 10px;font-weight:700;
    opacity:0;animation:fadeUp .6s ease .08s forwards;
  }
  header h1 span{color:var(--accent);}
  #bio{
    max-width:560px;color:var(--text-dim);font-size:16px;margin:0;
    opacity:0;animation:fadeUp .6s ease .16s forwards;
  }
  .header-links{
    display:flex;gap:18px;margin-top:14px;flex-wrap:wrap;
    opacity:0;animation:fadeUp .6s ease .24s forwards;
  }
  .header-links a{
    font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);
    text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:2px;
  }
  .header-links a:hover{color:var(--accent);border-color:var(--accent);}

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(14px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* ===== index section ===== */
  .index-heading{
    display:flex;align-items:baseline;justify-content:space-between;
    margin:32px 0 14px;
  }
  .index-heading h2{font-size:14px;margin:0;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:.14em;font-weight:600;}
  .index-count{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--text-dim);}

  .card-list{display:flex;flex-direction:column;}

  .card{
    display:grid;grid-template-columns:52px 1fr;gap:18px;
    padding:16px 4px;border-bottom:1px solid var(--line);
    text-decoration:none;color:inherit;
    opacity:0;transform:translateY(10px);
    animation:fadeUp .5s ease forwards;
    transition:background .15s;
  }
  .card:hover{background:var(--panel-hover);}
  .card:hover .card-title{color:var(--accent);}
  .card:hover .arrow{transform:translateX(4px);opacity:1;}
  .card:first-child{border-top:1px solid var(--line);}

  .card-index{
    font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);
    padding-top:2px;
  }
  .card-title{
    font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;
    margin:0 0 4px;display:flex;align-items:center;gap:8px;
  }
  .arrow{
    font-size:15px;opacity:0;transform:translateX(0);transition:all .15s;
    color:var(--accent);
  }
  .card-link{
    font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--text-dim);
    margin:0 0 8px;word-break:break-all;
  }
  .card-desc{margin:0;color:var(--text-dim);font-size:14.5px;max-width:60ch;}

  .empty{
    padding:60px 4px;text-align:center;color:var(--text-dim);
    border:1px dashed var(--line);border-radius:8px;font-size:14px;
  }

  footer{
    padding:24px 0 40px;color:var(--text-dim);font-size:12.5px;
    font-family:'JetBrains Mono',monospace;
  }

  @media(max-width:520px){
    header{padding:56px 0 40px;}
    .card{grid-template-columns:32px 1fr;gap:12px;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="eyebrow">Personal Index</div>
    <h1>Website of <span>Alex</span></h1>

    <!-- ============================================================
         EDIT ME: replace this paragraph with a short bio / intro.
         ============================================================ -->
    <p id="bio">
      A space to store vibe coded webistes and tools I made.
    </p>

    <!-- Optional: add or remove links here (email, GitHub, socials) -->
    <div class="header-links">
      <a href="alex.2d.3d.artist@gmail.com">email</a>
      <a href="https://github.com/Alex2d3dArtist/AlexWebsites" target="_blank" rel="noopener">github</a>
      <a href="https://github.com/Alex2d3dArtist/AlexWebsites" target="_blank" rel="noopener">twitter / x</a>
    </div>
  </header>

  <div class="index-heading">
    <h2>Projects</h2>
    <span class="index-count" id="indexCount"></span>
  </div>

  <div class="card-list" id="cardList"></div>

  <footer>
    Built and maintained on GitHub Pages.
  </footer>
</div>

<script>
/* ============================================================
   EDIT ME: this is the only part you need to touch to add,
   remove, or reorder projects. Each entry needs:
     title       - project name
     link        - full URL (https://...)
     description - one or two sentences
   ============================================================ */
const PROJECTS = [
  {
    title: "Cartridge Comparison Lab",
    link: "https://yourname.github.io/ammo-comparison/",
    description: "An interactive bar-chart tool comparing small-arms cartridges by length, energy, diameter, weight, velocity, and more."
  },
  {
    title: "Gun Comparison",
    link: "https://yourname.github.io/another-project/",
    description: "One or two sentences describing what this site does and why it exists."
  },
  {
    title: "Tank Comparison",
    link: "https://yourname.github.io/third-project/",
    description: "Swap this out, or duplicate this block to add more entries — the layout adjusts automatically."
  },
  {
    title: "Aircraft Comparison",
    link: "https://yourname.github.io/third-project/",
    description: "Swap this out, or duplicate this block to add more entries — the layout adjusts automatically."
  },
    {
    title: "UC Gundam Comparison",
    link: "https://yourname.github.io/third-project/",
    description: "Swap this out, or duplicate this block to add more entries — the layout adjusts automatically."
  },
  
];
/* ============================================================
   Nothing below this line needs editing.
   ============================================================ */

const listEl = document.getElementById('cardList');
const countEl = document.getElementById('indexCount');

function pad(n){ return String(n).padStart(3,'0'); }

if(PROJECTS.length === 0){
  listEl.innerHTML = `<div class="empty">No projects listed yet — add entries to the PROJECTS array in the script.</div>`;
} else {
  PROJECTS.forEach((p, i) => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = p.link;
    card.target = '_blank';
    card.rel = 'noopener';
    card.style.animationDelay = (i * 0.06) + 's';
    card.innerHTML = `
      <div class="card-index">${pad(i+1)}</div>
      <div>
        <div class="card-title">${p.title}<span class="arrow">→</span></div>
        <div class="card-link">${p.link.replace(/^https?:\/\//,'')}</div>
        <p class="card-desc">${p.description}</p>
      </div>
    `;
    listEl.appendChild(card);
  });
}
countEl.textContent = PROJECTS.length + (PROJECTS.length===1 ? ' entry' : ' entries');
</script>

</body>
</html>
